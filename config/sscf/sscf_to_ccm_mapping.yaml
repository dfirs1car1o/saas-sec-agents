# sscf_to_ccm_mapping.yaml
# SSCF control → CSA Cloud Controls Matrix v4.1 bridge
#
# Each SSCF control maps to one or more CCM v4.1 control IDs.
# CCM v4.1 carries the full regulatory crosswalk (SOX, HIPAA, SOC2 TSC,
# ISO 27001:2022, NIST SP 800-53 r5, PCI DSS v4, GDPR) in its published
# OSCAL/JSON bundle — we do not duplicate it here.
#
# CCM domain abbreviations:
#   IAM = Identity & Access Management
#   LOG = Logging & Monitoring
#   TVM = Threat & Vulnerability Management
#   SEF = Security Incident Management, E-Discovery & Cloud Forensics
#   CEK = Cryptography, Encryption & Key Management
#   DSP = Data Security & Privacy Lifecycle Management
#   CCC = Change Control & Configuration Management
#   GRC = Governance, Risk & Compliance
#
# Regulatory coverage per CCM control (summary — see CCM for full crosswalk):
#   IAM-01: SOC2 CC6.1 | ISO 27001 A.9.1.2
#   IAM-02: SOC2 CC6.1 | HIPAA §164.312(d) | ISO 27001 A.9.4.2
#   IAM-04: SOC2 CC6.3 | SOX ITGC | ISO 27001 A.9.2.3
#   IAM-05: SOC2 CC6.3 | ISO 27001 A.9.2.6
#   IAM-07: SOC2 CC6.1 | PCI DSS 8.6 | ISO 27001 A.9.4.3
#   LOG-01: SOC2 CC7.2 | SOX ITGC | ISO 27001 A.12.4.1
#   LOG-02: SOC2 CC7.2 | ISO 27001 A.12.4.3
#   LOG-06: SOC2 CC7.2 | HIPAA §164.312(b) | ISO 27001 A.12.4.1
#   LOG-07: SOC2 CC7.3 | ISO 27001 A.12.4.2
#   LOG-08: SOC2 CC7.2 | HIPAA §164.312(b) | SOX 7-year retention
#   LOG-09: SOC2 CC7.2 | ISO 27001 A.12.4.2
#   TVM-09: SOC2 CC7.1 | ISO 27001 A.12.6.1
#   SEF-01: SOC2 CC7.3 | HIPAA §164.308(a)(6) | ISO 27001 A.16.1.1
#   SEF-02: SOC2 CC7.3 | HIPAA §164.308(a)(6)(ii) | ISO 27001 A.16.1.5
#   SEF-03: SOC2 CC7.4 | ISO 27001 A.16.1.6
#   CEK-01: SOC2 CC6.7 | PCI DSS 3.5 | ISO 27001 A.10.1.1
#   DSP-04: SOC2 CC6.1 | HIPAA §164.312(a)(2)(iv) | GDPR Art.32
#   DSP-05: SOC2 CC6.1 | HIPAA §164.312(a) | ISO 27001 A.8.2.3
#   DSP-07: SOC2 CC6.7 | HIPAA §164.312(e) | GDPR Art.5(1)(f)
#   DSP-08: SOC2 CC6.7 | ISO 27001 A.8.3.3
#   CCC-01: SOC2 CC8.1 | SOX ITGC CM-01 | ISO 27001 A.14.2.2
#   CCC-04: SOC2 CC8.1 | SOX ITGC CM-04 | ISO 27001 A.12.1.2
#   CCC-06: SOC2 CC8.1 | ISO 27001 A.14.2.4
#   CCC-07: SOC2 CC8.1 | ISO 27001 A.14.2.7
#   GRC-01: SOC2 CC2.2 | SOX Sec.302 | ISO 27001 A.18.1.1
#   GRC-04: SOC2 CC3.2 | ISO 27001 A.6.1.1

version: "1.0"
ccm_version: "4.1"
source: "https://cloudsecurityalliance.org/artifacts/cloud-controls-matrix-v4-1"

mappings:
  - sscf_control_id: SSCF-IAM-001
    sscf_title: Multi-Factor Authentication Enforcement
    ccm_controls:
      - id: IAM-02
        title: Multi-Factor Authentication
        domain: IAM
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC6.1, HIPAA_164.312d, ISO27001_A.9.4.2]

  - sscf_control_id: SSCF-IAM-002
    sscf_title: Privileged Access Governance and Review
    ccm_controls:
      - id: IAM-04
        title: Access Management
        domain: IAM
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC6.3, SOX_ITGC, ISO27001_A.9.2.3]
      - id: IAM-05
        title: Least Privilege
        domain: IAM
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC6.3, ISO27001_A.9.2.6]

  - sscf_control_id: SSCF-IAM-003
    sscf_title: Federation and SSO Assurance
    ccm_controls:
      - id: IAM-01
        title: Identity and Access Management Policy and Procedures
        domain: IAM
        mapping_strength: partial
        regulatory_highlights: [SOC2_CC6.1, ISO27001_A.9.1.2]
      - id: IAM-07
        title: Third-Party Access
        domain: IAM
        mapping_strength: partial
        regulatory_highlights: [SOC2_CC6.1, PCI_DSS_8.6, ISO27001_A.9.4.3]

  - sscf_control_id: SSCF-LOG-001
    sscf_title: Security Telemetry Enablement
    ccm_controls:
      - id: LOG-06
        title: Security Monitoring and Alerting
        domain: LOG
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC7.2, HIPAA_164.312b, ISO27001_A.12.4.1]
      - id: LOG-07
        title: Log Records
        domain: LOG
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC7.3, ISO27001_A.12.4.2]

  - sscf_control_id: SSCF-LOG-002
    sscf_title: Administrative and Configuration Audit Logging
    ccm_controls:
      - id: LOG-01
        title: Logging and Monitoring Policy and Procedures
        domain: LOG
        mapping_strength: partial
        regulatory_highlights: [SOC2_CC7.2, SOX_ITGC, ISO27001_A.12.4.1]
      - id: LOG-02
        title: Audit Logs Protection
        domain: LOG
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC7.2, ISO27001_A.12.4.3]

  - sscf_control_id: SSCF-LOG-003
    sscf_title: Audit Retention and Integrity
    ccm_controls:
      - id: LOG-08
        title: Log Retention
        domain: LOG
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC7.2, HIPAA_164.312b, SOX_7yr_retention]
      - id: LOG-09
        title: Clock Synchronization
        domain: LOG
        mapping_strength: partial
        regulatory_highlights: [SOC2_CC7.2, ISO27001_A.12.4.4]

  - sscf_control_id: SSCF-TDR-001
    sscf_title: Real-Time Threat Policy Enforcement
    ccm_controls:
      - id: TVM-09
        title: Vulnerability Remediation Schedule
        domain: TVM
        mapping_strength: partial
        regulatory_highlights: [SOC2_CC7.1, ISO27001_A.12.6.1]
      - id: SEF-01
        title: Incident Management Policy and Procedures
        domain: SEF
        mapping_strength: partial
        regulatory_highlights: [SOC2_CC7.3, HIPAA_164.308a6, ISO27001_A.16.1.1]

  - sscf_control_id: SSCF-TDR-002
    sscf_title: Security Alert Triage and Escalation
    ccm_controls:
      - id: SEF-02
        title: Service Management Policy and Procedures
        domain: SEF
        mapping_strength: partial
        regulatory_highlights: [SOC2_CC7.3, HIPAA_164.308a6ii, ISO27001_A.16.1.5]
      - id: SEF-03
        title: Incident Reporting
        domain: SEF
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC7.4, ISO27001_A.16.1.6]

  - sscf_control_id: SSCF-CKM-001
    sscf_title: API Credential and Token Lifecycle
    ccm_controls:
      - id: CEK-01
        title: Encryption and Key Management Policy and Procedures
        domain: CEK
        mapping_strength: partial
        regulatory_highlights: [SOC2_CC6.7, PCI_DSS_3.5, ISO27001_A.10.1.1]
      - id: IAM-07
        title: Third-Party Access
        domain: IAM
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC6.1, PCI_DSS_8.6, ISO27001_A.9.4.3]

  - sscf_control_id: SSCF-DSP-001
    sscf_title: Sensitive Data Access Control
    ccm_controls:
      - id: DSP-04
        title: Data Classification
        domain: DSP
        mapping_strength: partial
        regulatory_highlights: [SOC2_CC6.1, HIPAA_164.312a2iv, GDPR_Art32]
      - id: DSP-05
        title: Data Flow Documentation
        domain: DSP
        mapping_strength: partial
        regulatory_highlights: [SOC2_CC6.1, HIPAA_164.312a, ISO27001_A.8.2.3]

  - sscf_control_id: SSCF-DSP-002
    sscf_title: Data Export and Exfiltration Controls
    ccm_controls:
      - id: DSP-07
        title: Secure Disposal
        domain: DSP
        mapping_strength: partial
        regulatory_highlights: [SOC2_CC6.7, HIPAA_164.312e, GDPR_Art5_1f]
      - id: DSP-08
        title: Data Leakage Prevention
        domain: DSP
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC6.7, ISO27001_A.8.3.3]

  - sscf_control_id: SSCF-CON-001
    sscf_title: SaaS Security Baseline Enforcement
    ccm_controls:
      - id: CCC-01
        title: Change Management Policy and Procedures
        domain: CCC
        mapping_strength: partial
        regulatory_highlights: [SOC2_CC8.1, SOX_ITGC_CM01, ISO27001_A.14.2.2]
      - id: CCC-07
        title: Detection of Baseline Deviations
        domain: CCC
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC8.1, ISO27001_A.14.2.7]

  - sscf_control_id: SSCF-CON-002
    sscf_title: Drift Detection and Baseline Deviation Management
    ccm_controls:
      - id: CCC-04
        title: Unauthorized Change Protection
        domain: CCC
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC8.1, SOX_ITGC_CM04, ISO27001_A.12.1.2]
      - id: CCC-06
        title: Change Management Baseline
        domain: CCC
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC8.1, ISO27001_A.14.2.4]

  - sscf_control_id: SSCF-GOV-001
    sscf_title: Exception Governance and Risk Acceptance
    ccm_controls:
      - id: GRC-01
        title: Governance and Risk Management Policy and Procedures
        domain: GRC
        mapping_strength: direct
        regulatory_highlights: [SOC2_CC2.2, SOX_Sec302, ISO27001_A.18.1.1]
      - id: GRC-04
        title: Management Oversight
        domain: GRC
        mapping_strength: partial
        regulatory_highlights: [SOC2_CC3.2, ISO27001_A.6.1.1]
