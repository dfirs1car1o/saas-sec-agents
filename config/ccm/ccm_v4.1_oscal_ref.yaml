# ccm_v4.1_oscal_ref.yaml
# Reference record for CSA Cloud Controls Matrix v4.1 OSCAL publication.
# This file is a pointer — the CCM catalog is NOT copied into this repo.
# Use the download URL to obtain the machine-readable OSCAL bundle.
#
# Usage in reports: cite this record when producing regulatory crosswalk tables.
# The sscf_to_ccm_mapping.yaml in config/sscf/ provides the SSCF → CCM bridge.

framework: CSA Cloud Controls Matrix
version: "4.1"
