name: sbom

on:
  push:
    branches: [main]

permissions:
  contents: read  # read-only; SBOM is uploaded as artifact, not committed

jobs:
  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - run: pip install cyclonedx-bom
      - run: pip install -e .

      - name: Generate SBOM
        run: cyclonedx-py environment --output-format json --output-file docs/sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: docs/sbom.cdx.json
          retention-days: 90
